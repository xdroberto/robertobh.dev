# /etc/nginx/sites-available/robertobh.dev
# Static SPA — Vite build output served from /var/www/portfolio
# Symlink: ln -s /etc/nginx/sites-available/robertobh.dev /etc/nginx/sites-enabled/
# Reload:  nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name robertobh.dev www.robertobh.dev;

    # Redirect all HTTP to HTTPS (certbot will manage the cert)
    return 301 https://robertobh.dev$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.robertobh.dev;

    # Canonical: drop www
    ssl_certificate     /etc/letsencrypt/live/robertobh.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/robertobh.dev/privkey.pem;
    return 301 https://robertobh.dev$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name robertobh.dev;

    root /var/www/portfolio;
    index index.html;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/robertobh.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/robertobh.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ───── Security headers ─────────────────────────────────────────────
    # HSTS — force HTTPS for 1 year (only after the site is stable on HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # MIME sniffing off
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking — only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Referrer policy — strip on cross-origin navigations
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable APIs the site does not use
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Content Security Policy
    # script-src: self + Google Fonts CSS (no inline scripts; Vite emits external chunks)
    # style-src: self + 'unsafe-inline' for Tailwind/JIT and Google Fonts CSS
    # font-src: Google Fonts CDN
    # img-src: self + data: (inline SVGs from simple-icons via ?raw)
    # connect-src: self + GitHub contribution API + GitHub events API
    # frame-ancestors: none — defense in depth alongside X-Frame-Options
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://github-contributions-api.jogruber.de https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ───── Caching ──────────────────────────────────────────────────────
    # Hashed assets emitted by Vite — cache hard
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — never cache (always fetch the latest manifest)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ───── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # Hide nginx version
    server_tokens off;
}
